<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Labeler</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="page">
        <header>
            <h1>Image Labeler</h1>
            <div class="counter">{{ labeled_count }} labeled, {{ skipped_count }} skipped / {{ total_count }} total</div>
        </header>

        <main>
            <div class="image-stage">
                {% if current_image %}
                    <img src="{{ url_for('image_file', filename=current_image) }}" alt="{{ current_image }}">
                {% else %}
                    <div class="empty">
                        <strong>All done.</strong><br>
                        Add more images to the images folder to keep labeling.
                    </div>
                {% endif %}
            </div>
        </main>

        <footer>
            {% if current_image %}
                <form action="{{ url_for('label_image') }}" method="post">
                    <input type="hidden" name="filename" value="{{ current_image }}">
                    {% for label in labels %}
                        <button type="submit" name="label" value="{{ label }}">{{ label }}</button>
                    {% endfor %}
                    <button class="skip-button" type="submit" formaction="{{ url_for('skip_image') }}">
                        Skip
                    </button>
                </form>
            {% endif %}
        </footer>
    </div>
</body>
</html>
